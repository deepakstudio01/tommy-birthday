<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Tommy ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    section {
      padding: 50px 20px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      max-width: 600px;
      margin: auto;
    }

    iframe {
      margin-top: 30px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- Background Music -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<section>

  <h1>Happy Birthday, Tommy ❤️</h1>

  <p>
    Duniya ke liye tum Gunjan ho,<br>
    lekin mere liye tum hamesha meri Tommy rahogi.<br><br>

    Us din jab tumne mujhe Bruno bulaya tha,<br>
    shayad wahi se meri kahani shuru ho gayi thi.<br><br>

    Aur aaj bhi, har din, main sirf tumhe hi choose karta hoon.
  </p>

  <h2 style="margin-top:40px;">A Special Surprise For You ❤️</h2>

  <iframe 
    width="90%" 
    height="450"
    src="https://www.youtube.com/embed/vWBItsjIUWdXyB49"
    frameborder="0"
    allowfullscreen>
  </iframe>

</section>

<!-- Music Script -->
<script>
window.addEventListener("load", function() {

  setTimeout(function() {

    var music = document.getElementById("bgMusic");

    music.currentTime = 52;   // Start from chorus
    music.volume = 0.2;       // Start low volume

    music.play().catch(()=>{});

    // Smooth volume increase
    let vol = 0.2;
    const fade = setInterval(function(){
      if (vol < 0.7) {
        vol += 0.05;
        music.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 400);

  }, 3000); // 3 second delay

});
</script>

</body>
</html>
