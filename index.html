<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday My Lifeline ❤️</title>

<style>
body {
  margin:0;
  padding:0;
  background: linear-gradient(to bottom, #000000, #3b0000);
  font-family: Arial, sans-serif;
  text-align:center;
  color:white;
  overflow-x:hidden;
}

h1{
  margin-top:60px;
  font-size:40px;
  color:#ff4d6d;
  text-shadow:0 0 20px red;
}

p{
  width:80%;
  margin:auto;
  margin-top:20px;
  line-height:1.6;
  font-size:18px;
}

button{
  margin-top:30px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 0 20px red;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

.video-box{
  margin-top:40px;
  display:none;
}

video{
  width:300px;
  border-radius:20px;
  box-shadow:0 0 40px red;
}

/* floating hearts */
.heart{
  position:fixed;
  bottom:-10px;
  font-size:20px;
  animation:float 6s linear infinite;
  color:#ff4d6d;
}

@keyframes float{
  0%{ transform:translateY(0); opacity:1;}
  100%{ transform:translateY(-100vh); opacity:0;}
}
</style>
</head>

<body>

<h1>Happy Birthday My Lifeline ❤️</h1>

<p>
Duniya ke liye tum sirf ek insaan ho…  
lekin mere liye tum meri duniya ho ❤️  
Har din tumhe choose karta hoon…  
aur har janam tumhe hi choose karunga.
</p>

<button id="revealBtn">Unlock Your Surprise ❤️</button>

<div class="video-box" id="videoSection">
  <video controls>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<script>

/* Floating Hearts */
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random()*20 + 15) + "px";
  document.body.appendChild(heart);
  setTimeout(()=>{ heart.remove(); },6000);
}

setInterval(createHeart, 800);

/* Reveal Video */
document.getElementById("revealBtn").addEventListener("click", function(){
  document.getElementById("videoSection").style.display = "block";
  this.style.display = "none";
});

</script>

</body>
</html>
