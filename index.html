<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Lifeline ❤️</title>

<style>

body {
  margin:0;
  padding:0;
  background: linear-gradient(135deg, #000000, #1a001a, #330033);
  font-family: 'Segoe UI', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
  color:white;
}

/* Soft floating hearts */
.heart {
  position: fixed;
  color: #ff99cc;
  font-size: 18px;
  animation: floatUp 8s linear infinite;
  opacity:0.6;
}

@keyframes floatUp {
  0% { transform:translateY(0); opacity:0; }
  50% { opacity:0.8; }
  100% { transform:translateY(-100vh); opacity:0; }
}

/* Glass card */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 182, 193, 0.3);
  border-radius: 25px;
  padding: 40px;
  width: 90%;
  max-width: 420px;
  text-align:center;
  box-shadow: 0 0 40px rgba(255, 105, 180, 0.3);
}

h1 {
  font-size:28px;
  color:#ff99cc;
  margin-bottom:15px;
}

p {
  font-size:15px;
  line-height:1.6;
  color:#f5c6e0;
}

.video-box {
  margin-top:20px;
}

iframe {
  width:100%;
  height:500px;
  border-radius:20px;
}

</style>
</head>

<body>

<div class="card">

<h1>Happy Birthday My Lifeline 💖</h1>

<p>
Duniya ke liye tum sirf ek insaan ho…  
lekin mere liye tum meri duniya ho.  

Har din tumhe choose karta hoon…  
aur har janam tumhe hi choose karunga.  

This is just a small surprise for the most special person of my life ✨
</p>

<div class="video-box">
  <iframe 
    src="https://www.youtube.com/embed/6775ueOYLo8?autoplay=1&mute=1"
    frameborder="0"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
</div>

</div>

<script>
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";
  document.body.appendChild(heart);
  setTimeout(() => { heart.remove(); }, 8000);
}
setInterval(createHeart, 800);
</script>

</body>
</html>
