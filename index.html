<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Lifeline ❤️</title>

<style>

body {
  margin:0;
  padding:0;
  background: linear-gradient(to bottom, #000000, #1a0000);
  font-family: 'Segoe UI', sans-serif;
  text-align:center;
  color:white;
  overflow-x:hidden;
}

h1 {
  margin-top:40px;
  font-size:38px;
  color:#ff4d6d;
  text-shadow:0 0 20px red;
}

p {
  font-size:18px;
  max-width:600px;
  margin:auto;
  line-height:1.6;
  padding:20px;
}

.video-box {
  margin-top:30px;
}

video {
  width:320px;
  height:570px;
  border-radius:20px;
  box-shadow:0 0 40px #ff1a4d;
}

/* Floating Hearts */

.heart {
  position:fixed;
  bottom:-50px;
  color:red;
  font-size:20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform:translateY(0); opacity:1; }
  100% { transform:translateY(-100vh); opacity:0; }
}

</style>
</head>

<body>

<h1>Happy Birthday My Lifeline ❤️</h1>

<p>
Duniya ke liye tum sirf ek insaan ho…  
lekin mere liye tum meri duniya ho ❤️  

Har din tumhe choose karta hoon…  
aur har janam tumhe hi choose karunga.  

This is just a small surprise for the most special person of my life 💖
</p>

<div class="video-box">
  <video controls autoplay>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<script>

/* Floating Hearts Generator */

function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 20) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 500);

</script>

</body>
</html>
