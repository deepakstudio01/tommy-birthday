<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Tommy ❤️</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

section{
padding:60px 20px;
}

h1{
font-size:32px;
color:#ffb3ec;
text-shadow:0 0 10px rgba(255,182,255,0.6);
}

p{
font-size:18px;
line-height:1.6;
max-width:700px;
margin:auto;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff4da6;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

video{
width:90%;
max-width:600px;
border-radius:15px;
margin-top:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<section>
<h1>Happy Birthday My Tommy 🐾❤️</h1>

<p>
Duniya ke liye tum Gunjan ho…  
Par mere liye tum hamesha meri Tommy rahogi 💖  
Aur tumhara Bruno hamesha tumhare saath rahega 💍✨  
</p>

<button onclick="playMusic()">Play Song 🎵</button>

<video controls>
<source src="video.mp4" type="video/mp4">
</video>

<p style="margin-top:40px;">
Yaha apni customized love story likh sakte ho ❤️  
First meeting… Bruno & Tommy moment…  
Yaha sab likhenge baad me final version me.
</p>

</section>

<script>
function playMusic(){
document.getElementById("bgMusic").play();
}
</script>

</body>
</html>
