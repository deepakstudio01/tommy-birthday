<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Tommy ❤️</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #000000, #111111);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    section {
      padding: 60px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      line-height: 1.7;
      max-width: 650px;
      margin: auto;
    }

    h2 {
      margin-top: 50px;
    }

    video {
      margin-top: 30px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(255, 0, 100, 0.6);
    }
  </style>
</head>

<body>

<!-- Background Music -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<section>

  <h1>Happy Birthday, Tommy ❤️</h1>

  <p>
    Duniya ke liye tum Gunjan ho,<br>
    lekin mere liye tum hamesha meri Tommy rahogi.<br><br>

    Us din jab tumne mujhe Bruno bulaya tha,<br>
    shayad wahi se meri kahani shuru ho gayi thi.<br><br>

    Aur aaj bhi, har din, main sirf tumhe hi choose karta hoon.
  </p>

  <h2>A Special Surprise For You ❤️</h2>

  <div style="display:flex; justify-content:center;">
    <video width="360" height="640" controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

</section>

<script>
window.addEventListener("load", function() {

  setTimeout(function() {

    var music = document.getElementById("bgMusic");

    music.currentTime = 52;   // Start from chorus
    music.volume = 0.2;

    music.play().catch(()=>{});

    // Smooth fade in
    let vol = 0.2;
    const fade = setInterval(function(){
      if (vol < 0.7) {
        vol += 0.05;
        music.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 400);

  }, 3000); // 3 second delay

});
</script>

</body>
</html>
