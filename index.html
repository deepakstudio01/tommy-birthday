<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Tommy</title>

<!-- Elegant Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:linear-gradient(135deg,#111111,#1f1f1f,#2c2c2c);
color:#f5f5f5;
text-align:center;
}

section{
padding:80px 20px;
max-width:900px;
margin:auto;
}

h1{
font-family:'Playfair Display', serif;
font-size:42px;
letter-spacing:1px;
margin-bottom:20px;
color:#ffffff;
}

p{
font-size:18px;
line-height:1.8;
color:#cccccc;
}

button{
padding:12px 28px;
border:1px solid #ffffff;
background:transparent;
color:white;
font-size:15px;
letter-spacing:1px;
cursor:pointer;
margin-top:25px;
transition:0.3s ease;
}

button:hover{
background:white;
color:black;
}

video{
width:100%;
max-width:650px;
border-radius:12px;
margin-top:40px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<section>

<h1>Happy Birthday, Tommy</h1>

<p>
Duniya ke liye tum Gunjan ho,  
lekin mere liye tum hamesha meri Tommy rahogi.  

Us din jab tumne mujhe Bruno bulaya tha,  
shayad wahi se meri kahani shuru ho gayi thi.  

Aur aaj bhi, har din, main sirf tumhe hi choose karta hoon.
</p>

<button onclick="playMusic()">Play Music</button>

<video controls>
<source src="video.mp4" type="video/mp4">
</video>

</section>

<script>
function playMusic(){
document.getElementById("bgMusic").play();
}
</script>

</body>
</html>
