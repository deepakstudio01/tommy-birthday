<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  padding:0;
  background: radial-gradient(circle at top,#3a0000,#150000,#000);
  color:white;
  text-align:center;
  overflow-x:hidden;
  font-family:'Cormorant Garamond', serif;
}

/* ENTRY SCREEN */
#entry{
  position:fixed;
  width:100%;
  height:100vh;
  background:linear-gradient(135deg,#2b0000,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  cursor:pointer;
  z-index:10;
}

#entry h1{
  font-family:'Great Vibes', cursive;
  font-size:65px;
  color:#ffb3c6;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 20px #ff1744;}
  to{text-shadow:0 0 50px #ff4d6d;}
}

#main{
  padding:40px 20px;
  display:none;
  animation:fadeIn 2s ease;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.title{
  font-family:'Great Vibes', cursive;
  font-size:55px;
  color:#ffc2d1;
  text-shadow:0 0 40px #ff1744;
}

.story{
  font-size:21px;
  max-width:850px;
  margin:40px auto;
  line-height:2;
  color:#ffe5ec;
}

button{
  padding:15px 50px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff1744,#ff4d6d);
  color:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 40px #ff1744;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

.video-wrapper{
  max-width:360px;
  margin:50px auto;
  display:none;
}

video{
  width:100%;
  border-radius:25px;
  box-shadow:0 0 80px rgba(255,23,68,0.8);
}

/* STARS */
.star{
  position:fixed;
  bottom:-20px;
  font-size:20px;
  animation:floatUp 12s linear infinite;
  color:#ffd6e0;
  text-shadow:0 0 20px #ff4d6d;
}

@keyframes floatUp{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-120vh);opacity:0;}
}

/* TEDDY */
.teddy{
  position:fixed;
  bottom:-50px;
  font-size:35px;
  animation:floatTeddy 18s linear infinite;
}

@keyframes floatTeddy{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(-130vh) rotate(360deg);opacity:0;}
}
</style>
</head>

<body>

<audio id="bgMusic" src="song.mp3" loop></audio>

<div id="entry">
  <h1>Tap To Enter ❤️</h1>
</div>

<div id="main">

<div class="title">Happy Birthday Meri Jaan 🎂💞</div>

<div class="story">
Tum meri zindagi ka sabse khoobsurat hissa ho ❤️  
Meri har saans… har dua… sirf tumhare naam ♾️  
</div>

<button id="openBtn">Open Our Special Memory ❤️</button>

<div class="video-wrapper" id="videoSection">
  <video controls playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

</div>

<script>

var music = document.getElementById("bgMusic");

document.getElementById("entry").addEventListener("click",function(){

  this.style.display="none";
  document.getElementById("main").style.display="block";

  music.volume=0;
  music.play();

  var fade=setInterval(function(){
    if(music.volume<0.4){
      music.volume+=0.02;
    }else{
      clearInterval(fade);
    }
  },200);

});

// Video Button
document.getElementById("openBtn").addEventListener("click",function(){
  document.getElementById("videoSection").style.display="block";
  this.style.display="none";
});

// Stars
function createStar(){
  const star=document.createElement("div");
  star.classList.add("star");
  star.innerHTML="✨";
  star.style.left=Math.random()*100+"vw";
  document.body.appendChild(star);
  setTimeout(()=>{star.remove();},12000);
}
setInterval(createStar,800);

// Teddy
function createTeddy(){
  const teddy=document.createElement("div");
  teddy.classList.add("teddy");
  teddy.innerHTML="🧸";
  teddy.style.left=Math.random()*100+"vw";
  document.body.appendChild(teddy);
  setTimeout(()=>{teddy.remove();},18000);
}
setInterval(createTeddy,5000);

</script>

</body>
</html>
